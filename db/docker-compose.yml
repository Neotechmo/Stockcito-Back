services:
  stockcito-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stockcito_db}
      MYSQL_USER: ${MYSQL_USER:-stockcito}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stockcito123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - stockcito_mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - stockcito-net

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      stockcito-db:
        condition: service_healthy
    networks:
      - stockcito-net

volumes:
  stockcito_mysql_data:
    driver: local

networks:
  stockcito-net:
    driver: bridge
